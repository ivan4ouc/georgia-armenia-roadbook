<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Roadbook — Georgia &amp; Armenia 2026</title>
<style>

/* ==========================================================================
   ROADBOOK — GEORGIA & ARMENIA 2026
   Стилевая система: Apple Human Interface Guidelines
   ========================================================================== */

:root{
  --bg: #ffffff;
  --bg-elevated: #ffffff;
  --bg-grouped: #f2f2f7;
  --text-primary: #1c1c1e;
  --text-secondary: #6c6c70;
  --text-tertiary: #a1a1a6;
  --separator: #e5e5ea;
  --accent: #0a6cff;
  --accent-soft: #eaf2ff;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  --radius-card: 20px;
  --radius-button: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark){
  :root{
    --bg: #000000;
    --bg-elevated: #1c1c1e;
    --bg-grouped: #000000;
    --text-primary: #f2f2f7;
    --text-secondary: #9b9ba3;
    --text-tertiary: #6c6c70;
    --separator: #2c2c2e;
    --accent: #3b9dff;
    --accent-soft: #10233d;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
  }
}

*{
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body{
  height: 100%;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior-y: none;
}

body{
  margin: 0;
  padding: 0;
  background: var(--bg-grouped);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button{
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

::selection{
  background: var(--accent-soft);
}

/* ---------- layout shell ---------- */

.app{
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.screen{
  display: none;
  min-height: 100vh;
  padding-top: var(--safe-top);
  padding-bottom: calc(48px + var(--safe-bottom));
  animation: fadeIn 0.32s ease;
}

.screen.active{
  display: block;
}

@keyframes fadeIn{
  from{ opacity: 0; transform: translateY(6px); }
  to{ opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce){
  .screen{ animation: none; }
}

/* ==========================================================================
   ОБЛОЖКА
   ========================================================================== */

.cover{
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  padding: 12vh 32px 48px;
}

.cover-top{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin-top: 8vh;
}

.cover-mark{
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: var(--bg-elevated);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cover-mark svg{
  width: 30px;
  height: 30px;
}

.cover-title{
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1.05;
}

.cover-subtitle{
  font-size: 19px;
  font-weight: 500;
  color: var(--text-secondary);
  margin: 0;
}

.cover-dates{
  font-size: 15px;
  color: var(--text-tertiary);
  margin: 0;
}

.cover-car{
  margin-top: 10px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 8px 16px;
  border: 1px solid var(--separator);
  border-radius: 100px;
}

.cover-bottom{
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
  padding-bottom: calc(16px + var(--safe-bottom));
}

/* ==========================================================================
   ОБЩИЕ КОМПОНЕНТЫ: КНОПКИ, ШАПКИ, КАРТОЧКИ
   ========================================================================== */

.btn{
  appearance: none;
  border: none;
  cursor: pointer;
  font-size: 17px;
  font-weight: 600;
  border-radius: var(--radius-button);
  padding: 17px 28px;
  transition: transform 0.15s ease, opacity 0.15s ease;
  width: 100%;
  max-width: 340px;
}

.btn:active{
  transform: scale(0.97);
  opacity: 0.85;
}

.btn-primary{
  background: var(--accent);
  color: #ffffff;
}

.btn-secondary{
  background: var(--bg-elevated);
  color: var(--text-primary);
  box-shadow: var(--shadow-card);
}

.btn-ghost{
  background: transparent;
  color: var(--accent);
  font-weight: 600;
  padding: 12px 20px;
  width: auto;
}

.page{
  padding: 0 20px 24px;
}

.page-header{
  padding: 20px 4px 18px;
}

.page-eyebrow{
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 4px;
}

.page-title{
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1.1;
}

.page-caption{
  font-size: 15px;
  color: var(--text-secondary);
  margin: 6px 0 0;
}

.card{
  background: var(--bg-elevated);
  border-radius: var(--radius-card);
  padding: 22px;
  box-shadow: var(--shadow-card);
  margin-bottom: 16px;
}

.card-label{
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 12px;
}

.card-title{
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0 0 4px;
}

.card p{
  font-size: 16px;
  line-height: 1.55;
  color: var(--text-primary);
  margin: 0 0 10px;
}

.card p:last-child{
  margin-bottom: 0;
}

.list-plain{
  list-style: none;
  margin: 0;
  padding: 0;
}

.list-plain li{
  font-size: 16px;
  line-height: 1.5;
  padding: 10px 0;
  border-bottom: 1px solid var(--separator);
  display: flex;
  gap: 10px;
}

.list-plain li:last-child{
  border-bottom: none;
  padding-bottom: 0;
}

.list-plain li:first-child{
  padding-top: 0;
}

.list-plain li::before{
  content: "";
  flex: none;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 8px;
}

.placeholder{
  font-size: 15px;
  font-style: normal;
  color: var(--text-tertiary);
  border: 1px dashed var(--separator);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  letter-spacing: 0.02em;
}

/* ==========================================================================
   TIMELINE (список дней)
   ========================================================================== */

.day-card{
  background: var(--bg-elevated);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 20px 22px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.15s ease;
  text-align: left;
  width: 100%;
  border: none;
  color: inherit;
}

.day-card:active{
  transform: scale(0.98);
}

.day-card-num{
  font-size: 13px;
  font-weight: 700;
  color: var(--text-tertiary);
  min-width: 30px;
}

.day-card-body{
  flex: 1;
}

.day-card-date{
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin: 0 0 3px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.day-card-title{
  font-size: 17px;
  font-weight: 600;
  margin: 0;
  line-height: 1.3;
}

.day-card-chevron{
  flex: none;
  width: 20px;
  height: 20px;
  opacity: 0.35;
}

.checklist-entry{
  background: var(--accent-soft);
  border-radius: var(--radius-card);
  padding: 20px 22px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  cursor: pointer;
  border: none;
  width: 100%;
  text-align: left;
  color: var(--accent);
}

.checklist-entry:active{
  transform: scale(0.98);
}

.checklist-entry-title{
  font-size: 17px;
  font-weight: 700;
  margin: 0;
}

.checklist-entry-caption{
  font-size: 14px;
  font-weight: 500;
  margin: 2px 0 0;
  opacity: 0.8;
}

/* ==========================================================================
   ЭКРАН ДНЯ
   ========================================================================== */

.day-header{
  padding: 18px 4px 8px;
}

.day-header-date{
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 6px;
}

.day-header-title{
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 10px;
}

.day-header-hotel{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  padding: 8px 14px;
  border-radius: 100px;
  box-shadow: var(--shadow-card);
}

.frame-item{
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--separator);
}

.frame-item:last-child{
  border-bottom: none;
  padding-bottom: 0;
}

.frame-item:first-child{
  padding-top: 0;
}

.frame-time{
  flex: none;
  width: 92px;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  padding-top: 1px;
}

.frame-text{
  flex: 1;
  font-size: 16px;
  line-height: 1.5;
}

.frame-text .sub{
  display: block;
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.frame-sub{
  margin: 18px 0 10px;
  padding-top: 6px;
}

.frame-sub-title{
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 0 8px;
}

.stop-item{
  background: var(--bg-grouped);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
}

.stop-item:last-child{
  margin-bottom: 0;
}

.stop-item-title{
  font-size: 15px;
  font-weight: 700;
  margin: 0 0 2px;
}

.stop-item-duration{
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin: 0 0 6px;
}

.stop-item p{
  font-size: 15px;
  line-height: 1.5;
  margin: 0;
  color: var(--text-primary);
}

.branch{
  padding: 14px 0;
  border-bottom: 1px solid var(--separator);
}

.branch:last-child{
  border-bottom: none;
  padding-bottom: 0;
}

.branch:first-child{
  padding-top: 0;
}

.branch-if{
  font-size: 15px;
  font-weight: 700;
  margin: 0 0 6px;
}

.branch-then{
  font-size: 16px;
  line-height: 1.5;
  margin: 0;
  color: var(--text-secondary);
}

.verdict-row{
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.verdict-row:last-child{
  margin-bottom: 0;
}

.verdict-tag{
  flex: none;
  font-size: 18px;
  line-height: 1.4;
}

.verdict-col-label{
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin: 0 0 8px;
}

.verdict-col-label.must{ color: var(--accent); }
.verdict-col-label.cut{ color: var(--text-tertiary); }

.verdict-item{
  font-size: 15px;
  line-height: 1.5;
  margin: 0 0 6px;
}

/* ---------- нижняя навигация внутри дня ---------- */

.day-nav{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 8px;
}

.nav-btn{
  flex: 1;
  background: var(--bg-elevated);
  box-shadow: var(--shadow-card);
  border-radius: var(--radius-button);
  border: none;
  padding: 15px 14px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  text-align: center;
  cursor: pointer;
}

.nav-btn:active{
  transform: scale(0.97);
}

.nav-btn.disabled{
  opacity: 0.35;
  pointer-events: none;
}

.nav-btn.center{
  color: var(--accent);
  flex: 0.9;
}

/* ==========================================================================
   ЧЕК-ЛИСТЫ
   ========================================================================== */

.checklist-group{
  margin-bottom: 22px;
}

.checklist-group-title{
  font-size: 20px;
  font-weight: 700;
  margin: 0 0 12px;
  padding: 0 2px;
}

.check-row{
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 0;
  border-bottom: 1px solid var(--separator);
  cursor: pointer;
}

.check-row:last-child{
  border-bottom: none;
}

.check-box{
  flex: none;
  width: 26px;
  height: 26px;
  border-radius: 8px;
  border: 2px solid var(--separator);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.check-box.checked{
  background: var(--accent);
  border-color: var(--accent);
}

.check-box svg{
  width: 15px;
  height: 15px;
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.check-box.checked svg{
  opacity: 1;
  transform: scale(1);
}

.check-label{
  font-size: 16px;
  line-height: 1.4;
  transition: color 0.15s ease, opacity 0.15s ease;
}

.check-row.done .check-label{
  color: var(--text-tertiary);
  text-decoration: line-through;
}

/* ---------- top bar (назад) ---------- */

.topbar{
  display: flex;
  align-items: center;
  padding: 14px 20px 0;
}

.back-btn{
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 8px 6px 0;
}

.back-btn svg{
  width: 22px;
  height: 22px;
}

.back-btn:active{
  opacity: 0.6;
}

/* slide-in for day/checklist screens */
.screen.slide{
  animation: slideIn 0.28s ease;
}

@keyframes slideIn{
  from{ opacity: 0; transform: translateX(14px); }
  to{ opacity: 1; transform: translateX(0); }
}

@media (prefers-reduced-motion: reduce){
  .screen.slide{ animation: none; }
}

</style>
</head>
<body>

<div class="app" id="app">

  <!-- ==========================================================================
       ЭКРАН 1 — ОБЛОЖКА
       ========================================================================== -->
  <section class="screen active" id="screen-cover">
    <div class="cover">
      <div class="cover-top">
        <div class="cover-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 20L12 4L20 20" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 13H16" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="cover-title">ROADBOOK</h1>
        <p class="cover-subtitle">Грузия и Армения</p>
        <p class="cover-dates">18 — 29 августа 2026</p>
      </div>
      <div class="cover-bottom">
        <button type="button" class="btn btn-primary" data-action="go-timeline">Начать путешествие 🚀</button>
      </div>
    </div>
  </section>

  <!-- ==========================================================================
       ЭКРАН 2 — TIMELINE
       ========================================================================== -->
  <section class="screen" id="screen-timeline">
    <div class="page">
      <div class="page-header">
        <p class="page-eyebrow">Roadbook</p>
        <h2 class="page-title">Маршрут</h2>
        <p class="page-caption">12 дней · Грузия и Армения</p>
      </div>

      <button type="button" class="checklist-entry" data-action="open-checklists">
        <div>
          <p class="checklist-entry-title">Чек-листы</p>
          <p class="checklist-entry-caption">Утренний · Перед границей</p>
        </div>
        <svg class="day-card-chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div id="timeline-list"></div>
    </div>
  </section>

  <!-- ==========================================================================
       ЭКРАН 3 — ДЕНЬ
       ========================================================================== -->
  <section class="screen slide" id="screen-day">
    <div class="topbar">
      <button type="button" class="back-btn" data-action="go-timeline">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Timeline
      </button>
    </div>
    <div class="page" id="day-content"></div>
  </section>

  <!-- ==========================================================================
       ЭКРАН 4 — ЧЕК-ЛИСТЫ
       ========================================================================== -->
  <section class="screen slide" id="screen-checklists">
    <div class="topbar">
      <button type="button" class="back-btn" data-action="go-timeline">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Timeline
      </button>
    </div>
    <div class="page">
      <div class="page-header">
        <p class="page-eyebrow">Roadbook</p>
        <h2 class="page-title">Чек-листы</h2>
      </div>
      <div class="checklist-group">
        <h3 class="checklist-group-title">Утренний</h3>
        <div id="checklist-morning"></div>
      </div>
      <div class="checklist-group">
        <h3 class="checklist-group-title">Перед границей</h3>
        <div id="checklist-border"></div>
      </div>
    </div>
  </section>

</div>

<script>
/* ==========================================================================
   ROADBOOK — GEORGIA & ARMENIA 2026
   JavaScript
   ========================================================================== */

/* ---------- вспомогательные функции для сборки КАРКАСА ДНЯ ---------- */

function timeItem(time, text){
  return '<div class="frame-item"><div class="frame-time">' + time + '</div><div class="frame-text">' + text + '</div></div>';
}

function subHeader(text){
  return '<div class="frame-sub"><p class="frame-sub-title">' + text + '</p></div>';
}

function stopItem(title, duration, text){
  return '<div class="stop-item"><p class="stop-item-title">' + title + '</p><p class="stop-item-duration">' + duration + '</p><p>' + text + '</p></div>';
}

function branch(ifText, thenText){
  return '<div class="branch"><p class="branch-if">' + ifText + '</p><p class="branch-then">' + thenText + '</p></div>';
}

var PLACEHOLDER = '<div class="placeholder">=== ГОТОВЫЙ ТЕКСТ ГЛАВЫ ВСТАВЛЯЕТСЯ СЮДА ===</div>';

/* ==========================================================================
   ДАННЫЕ ROADBOOK
   ========================================================================== */

var days = [

  /* ---------------- ДЕНЬ 1 — 18 АВГУСТА ---------------- */
  {
    date: '18 августа',
    weekday: 'Понедельник',
    title: 'Армавир → Верхний Ларс → Военно-Грузинская дорога → Тбилиси',
    hotel: 'Hotel Adamo',
    goal: [
      'Спокойно пройти границу.',
      'Получить удовольствие от Военно-Грузинской дороги.',
      'Заселиться без спешки.',
      'Хорошо поужинать.',
      'Немного погулять по вечернему Тбилиси.',
      'Лечь спать пораньше.'
    ],
    frame:
      timeItem('03:20', 'Подъём.') +
      timeItem('03:40–03:55', 'Последняя проверка автомобиля.<span class="sub">Полный бак · документы · наличные · вода · зарядки · powerbank · офлайн-карты</span>') +
      timeItem('04:00', 'Выезд из Армавира.') +
      timeItem('06:10–06:25', 'Первая остановка. 15 минут.<span class="sub">Кофе, туалет, размяться.</span>') +

var currentDayIndex = 0;

function renderTimeline(){
  var list = document.getElementById('timeline-list');
  var html = '';
  days.forEach(function(day, index){
    html += '<button type="button" class="day-card" data-action="open-day" data-day-index="' + index + '">' +
      '<div class="day-card-num">' + String(index + 1).padStart(2, '0') + '</div>' +
      '<div class="day-card-body">' +
        '<p class="day-card-date">' + day.date + '</p>' +
        '<p class="day-card-title">' + day.title + '</p>' +
      '</div>' +
      '<svg class="day-card-chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>' +
    '</button>';
  });
  list.innerHTML = html;
}

function goalCard(day){
  if(!day.goal){
    return '<div class="card"><p class="card-label">Цель дня</p>' + PLACEHOLDER + '</div>';
  }
  var items = day.goal.map(function(item){ return '<li>' + item + '</li>'; }).join('');
  return '<div class="card"><p class="card-label">Цель дня</p><ul class="list-plain">' + items + '</ul></div>';
}

function frameCard(day){
  if(!day.frame){
    return '<div class="card"><p class="card-label">Каркас дня</p>' + PLACEHOLDER + '</div>';
  }
  return '<div class="card"><p class="card-label">Каркас дня</p>' + day.frame + '</div>';
}

function insiderCard(day){
  if(!day.insider){

  var items = day.insider.map(function(item){ return '<li>' + item + '</li>'; }).join('');

}

function planBCard(day){
  if(!day.planBHtml){
    return '<div class="card"><p class="card-label">Plan B</p>' + PLACEHOLDER + '</div>';

  return '<div class="card"><p class="card-label">Plan B</p>' + day.planBHtml + '</div>';
}

  }
  var v = day.verdict;
  var html = '<div class="card"><p class="card-label">Verdict</p>';
  if(v.must){
    html += '<div class="verdict-row"><div><p class="verdict-col-label must">Must have</p>' +
      v.must.map(function(item){ return '<p class="verdict-item">✓ ' + item + '</p>'; }).join('') +
      '</div></div>';
  }
  if(v.wish){
    html += '<div class="verdict-row"><div><p class="verdict-col-label must">Желательно</p>' +
      v.wish.map(function(item){ return '<p class="verdict-item">✓ ' + item + '</p>'; }).join('') +
      '</div></div>';
  }
  if(v.cut){
    html += '<div class="verdict-row"><div><p class="verdict-col-label cut">Можно убрать</p>' +
      v.cut.map(function(item){ return '<p class="verdict-item">— ' + item + '</p>'; }).join('') +
      '</div></div>';
  }
  html += '</div>';
  return html;
}

function renderDay(index){
  var day = days[index];
  var container = document.getElementById('day-content');

  var hotelHtml = day.hotel
    ? '<div class="day-header-hotel">🏨 ' + day.hotel + '</div>'
    : '';

  var html =
    '<div class="day-header">' +
      '<p class="day-header-date">' + day.date + ' · ' + day.weekday + '</p>' +
      '<h2 class="day-header-title">' + day.title + '</h2>' +
      hotelHtml +
    '</div>' +
    goalCard(day) +
    frameCard(day) +
    insiderCard(day) +
    planBCard(day) +
    verdictCard(day) +
    '<div class="day-nav">' +
      '<button type="button" class="nav-btn' + (index === 0 ? ' disabled' : '') + '" data-action="nav-prev">← Предыдущий</button>' +
      '<button type="button" class="nav-btn center" data-action="go-timeline">Timeline</button>' +
      '<button type="button" class="nav-btn' + (index === days.length - 1 ? ' disabled' : '') + '" data-action="nav-next">Следующий →</button>' +
    '</div>';

  container.innerHTML = html;
}

function loadSaved(key){
  try{
    return JSON.parse(localStorage.getItem(key)) || {};
  }catch(e){
    return {};
  }
}

function saveSaved(key, data){
  try{
    localStorage.setItem(key, JSON.stringify(data));
  }catch(e){}
}

function renderChecklist(containerId, storageKey, items){
  var container = document.getElementById(containerId);
  var saved = loadSaved(storageKey);

  var html = '';
  items.forEach(function(item, index){
    var checked = !!saved[index];
    html += '<div class="check-row' + (checked ? ' done' : '') + '" data-index="' + index + '">' +
      '<div class="check-box' + (checked ? ' checked' : '') + '">' +
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M5 13L9 17L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</div>' +
      '<div class="check-label">' + item + '</div>' +
    '</div>';
  });
  container.innerHTML = html;
}

function toggleCheck(rowEl, storageKey, index){
  var saved = loadSaved(storageKey);
  saved[index] = !saved[index];
  saveSaved(storageKey, saved);

  rowEl.classList.toggle('done', !!saved[index]);
  rowEl.querySelector('.check-box').classList.toggle('checked', !!saved[index]);
}

/* ==========================================================================
   НАВИГАЦИЯ МЕЖДУ ЭКРАНАМИ
   ========================================================================== */

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(el){
    el.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goToTimeline(){
  showScreen('screen-timeline');
}

function openDay(index){
  if(index < 0 || index >= days.length) return;
  currentDayIndex = index;
  renderDay(index);
  showScreen('screen-day');
}

function openChecklists(){
  showScreen('screen-checklists');
}

function handleAppClick(e){
  var actionEl = e.target.closest('[data-action]');
  if(actionEl){
    var action = actionEl.getAttribute('data-action');
    if(action === 'go-timeline'){
      goToTimeline();
    }else if(action === 'open-checklists'){
      openChecklists();
    }else if(action === 'open-day'){
      var dayIdx = parseInt(actionEl.getAttribute('data-day-index'), 10);
      if(!isNaN(dayIdx)) openDay(dayIdx);
    }else if(action === 'nav-prev'){
      if(!actionEl.classList.contains('disabled')) openDay(currentDayIndex - 1);
    }else if(action === 'nav-next'){
      if(!actionEl.classList.contains('disabled')) openDay(currentDayIndex + 1);
    }
    return;
  }

  var checkRow = e.target.closest('.check-row');
  if(checkRow){
    var container = checkRow.closest('#checklist-morning, #checklist-border');
    if(container){
      var storageKey = container.id === 'checklist-morning'
        ? 'roadbook-checklist-morning'
        : 'roadbook-checklist-border';
      var checkIdx = parseInt(checkRow.getAttribute('data-index'), 10);
      if(!isNaN(checkIdx)) toggleCheck(checkRow, storageKey, checkIdx);
    }
  }
}

function initApp(){
  document.getElementById('app').addEventListener('click', handleAppClick);
  renderTimeline();
  renderChecklist('checklist-morning', 'roadbook-checklist-morning', checklistMorning);
  renderChecklist('checklist-border', 'roadbook-checklist-border', checklistBorder);
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initApp);
}else{
  initApp();
}

</script>
